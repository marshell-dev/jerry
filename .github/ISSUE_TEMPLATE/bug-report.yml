name: Bug report
description: Report a reproducible problem in jerry
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is broken and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide a minimal reproducible example.
      render: ts
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node/browser version, package manager, OS, and jerry version or commit.
    validations:
      required: true

